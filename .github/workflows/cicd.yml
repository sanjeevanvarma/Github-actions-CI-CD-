name: Java CI/CD Pipeline to Tomcat
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Install Maven if missing
      - name: Ensure Maven is installed
        run: |
          if ! command -v mvn &> /dev/null; then
            echo "Maven not found. Installing..."
            sudo apt-get install -y maven
          else
            echo "Maven is already installed"
          fi
          mvn -version


      # 5. Build with Maven
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 6. Upload WAR as artifact
      - name: Upload WAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: myapp
          path: target/*.war

      # 7. Install SonarQube Scanner CLI
      - name: Install SonarQube Scanner CLI
        run: |
          if [ ! -d "$HOME/sonar-scanner-cli" ]; then
            echo "Downloading SonarQube Scanner CLI..."
            wget https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-7.3.0.5189-linux-x64.zip -O /tmp/sonar-scanner.zip
            unzip /tmp/sonar-scanner.zip -d $HOME
            mv $HOME/sonar-scanner-7.3.0.5189-linux-x64 $HOME/sonar-scanner-cli
          fi
          export PATH=$HOME/sonar-scanner-cli/bin:$PATH
          sonar-scanner -v

      # 8. SonarQube Analysis
      - name: SonarQube Analysis
        env:
          SONAR_HOST: ${{ secrets.SONAR_HOST }}
          SONAR_LOGIN: ${{ secrets.SONAR_TOKEN }}
        run: |
          echo "SonarQube server URL: $SONAR_HOST"
          curl -I $SONAR_HOST
          mvn sonar:sonar \
            -Dsonar.projectKey=hotstar \
            -Dsonar.host.url=$SONAR_HOST \
            -Dsonar.login=$SONAR_LOGIN

      # ─────────────────────────────────────────
      # 9. Upload WAR to Nexus Repository
      # ─────────────────────────────────────────
      - name: Upload WAR to Nexus
        run: |
          WAR_FILE=$(ls target/*.war | head -n 1)
          WAR_NAME=$(basename $WAR_FILE)
          echo "Uploading $WAR_NAME to Nexus..."
          curl -v -u "${{ secrets.NEXUS_USERNAME }}:${{ secrets.NEXUS_PASSWORD }}" \
            --upload-file "$WAR_FILE" \
            "${{ secrets.NEXUS_URL }}/repository/maven-releases/com/example/myapp/1.0.0/$WAR_NAME"

      # ─────────────────────────────────────────
      # 10. Upload WAR to S3
      # ─────────────────────────────────────────
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1   # change to your bucket's region

      - name: Upload WAR to S3
        run: |
          WAR_FILE=$(ls target/*.war | head -n 1)
          WAR_NAME=$(basename $WAR_FILE)
          echo "Uploading $WAR_NAME to S3..."
          aws s3 cp "$WAR_FILE" s3://amazon-github-act-bkt/builds/$WAR_NAME
          echo "Upload complete!"
          echo "S3 Path: s3://amazon-github-act-bkt/builds/$WAR_NAME"

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      # 11. Download WAR artifact
      - name: Download WAR artifact
        uses: actions/download-artifact@v4
        with:
          name: myapp

      # 12. Deploy WAR to Tomcat
      - name: Deploy to Tomcat
        run: |
          WAR_FILE=$(ls *.war)
          echo "Deploying $WAR_FILE to Tomcat..."
          curl -v --upload-file "$WAR_FILE" \
            "http://${{ secrets.TOMCAT_USER }}:${{ secrets.TOMCAT_PASSWORD }}@${{ secrets.TOMCAT_HOST }}/manager/text/deploy?path=/myapp&update=true"
